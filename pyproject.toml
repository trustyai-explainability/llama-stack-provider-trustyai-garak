[project]
name = "llama-stack-provider-trustyai-garak"
dynamic = ["version"]
description = "Out-Of-Tree Llama Stack provider for Garak Red-teaming"
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [
    {name = "Sai Chandra Pandraju", email = "saichandrapandraju@gmail.com"},
    {name = "TrustyAI Team"}
]
keywords = ["llama-stack", "garak", "red-teaming", "security", "ai-safety"]
dependencies = [
    "llama-stack-client>=0.5.0",
    "llama-stack-api>=0.5.0",
    # Remote execution dependencies
    "kfp>=2.14.6",
    "kfp-kubernetes>=2.14.6",
    "kfp-server-api>=2.14.6",
    "boto3>=1.35.88",
    # eval-hub integration
    "eval-hub-sdk[adapter] @ git+https://github.com/eval-hub/eval-hub-sdk.git@main",
]

[project.urls]
homepage = "https://github.com/trustyai-explainability/llama-stack-provider-trustyai-garak"
repository = "https://github.com/trustyai-explainability/llama-stack-provider-trustyai-garak"

[build-system]
requires = ["setuptools>=80.9.0", "setuptools-scm[simple]>=9.2"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools_scm]
# Automatically derive version from git tags
# Supports the midstream pattern: X.Y.Z+rhaiv.N
version_file = "src/llama_stack_provider_trustyai_garak/_version.py"
# Preserve local version from tags (e.g., +rhaiv.N)
local_scheme = "no-local-version"
# Don't modify version - use tag as-is
version_scheme = "no-guess-dev"

[project.optional-dependencies]
inline = [
    "pyasn1==0.6.2", # trivy high vul fix
    "protobuf==6.33.5", # trivy high vul fix
    "garak==0.14.0",
]
dev = ["pytest", "pytest-cov",  "pytest-asyncio", "black", "isort"]
server = ["llama-stack>=0.5.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_paths = ["src"]
addopts = "-v"
